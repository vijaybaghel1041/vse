<nav class="top-nav">

  <!-- Left: Brand -->
  <div class="nav-brand">
    <div class="nav-logo">V</div>
    <div class="nav-brand-text">
      <span class="nav-brand-name">VSE</span>
      <span class="nav-brand-edition">Audit System</span>
    </div>
  </div>

  <!-- Center: Quick Nav -->
  <div class="nav-links">
    <a routerLink="/dashboard" class="nav-link">Overview</a>
    <a *ngIf="role === 'ADMIN'"   routerLink="/admin/members"   class="nav-link">Members</a>
    <a *ngIf="role === 'ADMIN'"   routerLink="/admin/audits"    class="nav-link">Audits</a>
    <a *ngIf="role === 'MEMBER'"  routerLink="/member/initiate" class="nav-link">My Audits</a>
    <a *ngIf="role === 'AUDITOR'" routerLink="/auditor/queue"   class="nav-link">Queue</a>
  </div>

  <!-- Right: User + Logout -->
  <div class="nav-right">
    <div class="nav-user-info" *ngIf="role">
      <div class="nav-avatar">{{ username.charAt(0).toUpperCase() }}</div>
      <div class="nav-user-meta">
        <span class="nav-username">{{ username }}</span>
        <span class="nav-role-tag {{ role.toLowerCase() }}">{{ role }}</span>
      </div>
    </div>
    <button (click)="logout()" class="nav-logout-btn">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" style="width:16px;height:16px;">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
          d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
      </svg>
      Sign Out
    </button>
  </div>

</nav>
