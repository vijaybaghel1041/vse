<aside class="sidebar-shell" [class.collapsed]="!opened">

  <!-- Brand -->
  <div class="sidebar-brand">
    <div class="brand-icon">
      <span>V</span>
    </div>
    <div class="brand-text" *ngIf="opened">
      <span class="brand-name">VSE</span>
      <span class="brand-sub">OFFICIAL</span>
    </div>
  </div>

  <!-- Role Badge -->
  <div class="role-pill" *ngIf="opened && role">
    <span class="role-dot {{ role.toLowerCase() }}"></span>
    <span class="role-label {{ role.toLowerCase() }}">{{ role }}</span>
  </div>

  <!-- Navigation -->
  <nav class="sidebar-nav">

    <!-- Dashboard (All Roles) -->
    <a routerLink="/dashboard" routerLinkActive="active-link" class="nav-item">
      <svg class="nav-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
          d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
      </svg>
      <span class="nav-label" *ngIf="opened">Dashboard</span>
    </a>

    <!-- ══════════ ADMIN ══════════ -->
    <ng-container *ngIf="role === 'ADMIN'">
      <div class="nav-section-label" *ngIf="opened">Administration</div>

      <a routerLink="/admin/members" routerLinkActive="active-link" class="nav-item">
        <svg class="nav-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
            d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"/>
        </svg>
        <span class="nav-label" *ngIf="opened">Member Registry</span>
      </a>

      <a routerLink="/admin/audits" routerLinkActive="active-link" class="nav-item">
        <svg class="nav-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
            d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"/>
        </svg>
        <span class="nav-label" *ngIf="opened">Audit Oversight</span>
      </a>

      <a routerLink="/admin/reports" routerLinkActive="active-link" class="nav-item">
        <svg class="nav-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
            d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/>
        </svg>
        <span class="nav-label" *ngIf="opened">Reports</span>
      </a>
    </ng-container>

    <!-- ══════════ MEMBER ══════════ -->
    <ng-container *ngIf="role === 'MEMBER'">
      <div class="nav-section-label" *ngIf="opened">My Submissions</div>

      <a routerLink="/member/initiate" routerLinkActive="active-link" class="nav-item">
        <svg class="nav-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
            d="M12 4v16m8-8H4"/>
        </svg>
        <span class="nav-label" *ngIf="opened">Initiate Audit</span>
      </a>

      <a routerLink="/member/history" routerLinkActive="active-link" class="nav-item">
        <svg class="nav-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
            d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/>
        </svg>
        <span class="nav-label" *ngIf="opened">Audit History</span>
      </a>

      <a routerLink="/annual-submission" routerLinkActive="active-link" class="nav-item">
        <svg class="nav-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
            d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
        </svg>
        <span class="nav-label" *ngIf="opened">Annual Report</span>
      </a>
    </ng-container>

    <!-- ══════════ AUDITOR ══════════ -->
    <ng-container *ngIf="role === 'AUDITOR'">
      <div class="nav-section-label" *ngIf="opened">Audit Center</div>

      <a routerLink="/auditor/queue" routerLinkActive="active-link" class="nav-item">
        <svg class="nav-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
            d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01"/>
        </svg>
        <span class="nav-label" *ngIf="opened">Verification Queue</span>
      </a>

      <a routerLink="/auditor/completed" routerLinkActive="active-link" class="nav-item">
        <svg class="nav-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
            d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
        </svg>
        <span class="nav-label" *ngIf="opened">Completed Audits</span>
      </a>
    </ng-container>

  </nav>

  <!-- Collapse Toggle -->
  <button class="sidebar-toggle" (click)="toggle()">
    <svg *ngIf="opened" fill="none" stroke="currentColor" viewBox="0 0 24 24" class="w-4 h-4">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 19l-7-7 7-7m8 14l-7-7 7-7"/>
    </svg>
    <svg *ngIf="!opened" fill="none" stroke="currentColor" viewBox="0 0 24 24" class="w-4 h-4">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 5l7 7-7 7M5 5l7 7-7 7"/>
    </svg>
  </button>

</aside>
