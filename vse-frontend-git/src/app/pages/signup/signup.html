<div class="glass-card">
  <div class="card-header">
    <h2 class="title">Create Account</h2>
    <p class="subtitle">Join us and start your journey</p>
  </div>

  <form class="glass-form">
    <div class="input-group">
      <label>Email</label>
      <input type="email" [(ngModel)]="email" name="email" placeholder="Enter your email">
    </div>

    <div class="input-group">
      <label>Username</label>
      <input type="text" [(ngModel)]="username" name="username" placeholder="Choose a username">
    </div>

    <div class="input-group">
      <label>Phone Number</label>
      <input type="tel" [(ngModel)]="phone" name="phone" placeholder="Enter your phone number">
    </div>

    <div class="input-group">
      <label>Password</label>
      <input type="password" [(ngModel)]="password" name="password" placeholder="Create a password">
    </div>

    <button type="button" class="btn-primary" (click)="register()">Sign up</button>
  </form>

  <div class="card-footer">
    <p>Already have an account? <a routerLink="/login" class="text-primary hover-underline">Sign in</a></p>
  </div>
</div>
