<div class="glass-card">
  <div class="card-header">
    <h2 class="title">Welcome Back</h2>
    <p class="subtitle">Please enter your details to sign in</p>
  </div>

  <form class="glass-form">
    <div class="input-group">
      <label>Username</label>
      <input type="text" [(ngModel)]="username" name="username" placeholder="Enter your username">
    </div>

    <div class="input-group">
      <label>Password</label>
      <input type="password" [(ngModel)]="password" name="password" placeholder="Enter your password">
    </div>

    <button type="button" class="btn-primary" (click)="login()">Sign in</button>
  </form>

  <div class="card-footer">
    <p>Don't have an account? <a routerLink="/signup" class="text-primary hover-underline">Sign up</a></p>
  </div>
</div>
