<div class="burj-bg min-h-screen p-8">
  <div class="max-w-7xl mx-auto space-y-10">
    
    <!-- Premium Header -->
    <header class="flex justify-between items-end border-b border-auditor-green/20 pb-8">
      <div>
        <h1 class="text-4xl font-bold tracking-tight text-auditor-green">Compliance Control Center</h1>
        <p class="text-gray-400 mt-2 text-lg italic">Verification & Authentication Panel</p>
      </div>
      <div class="glass-container glass-auditor px-6 py-3 flex items-center gap-4">
        <div class="w-8 h-8 rounded-full bg-auditor-green/20 flex items-center justify-center border border-auditor-green/30">
          <span class="text-auditor-green text-xs font-bold">VIP</span>
        </div>
        <span class="font-medium text-auditor-green">Auditor Authorized</span>
      </div>
    </header>

    <!-- Auditor Task Cards -->
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-10">
      
      <!-- Verification Queue -->
      <div class="glass-container glass-auditor p-10 space-y-8">
        <div class="flex items-center gap-4">
          <div class="p-3 bg-auditor-green/10 rounded-xl">
            <svg class="w-8 h-8 text-auditor-green" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path>
            </svg>
          </div>
          <h2 class="text-2xl font-bold">Unverified Queue</h2>
        </div>
        
        <div class="space-y-4">
          <div class="flex items-center justify-between p-5 bg-black/20 rounded-xl border border-white/5 hover:border-auditor-green/30 transition-all cursor-pointer">
            <div class="flex items-center gap-4">
              <img src="https://ui-avatars.com/api/?name=Vijay+Baghel&background=2ECC71&color=fff" class="w-12 h-12 rounded-full border-2 border-auditor-green/20" alt="User">
              <div>
                <p class="font-bold">Vijay Baghel</p>
                <p class="text-gray-500 text-sm">Member ID: VSE-8821</p>
              </div>
            </div>
            <button class="text-auditor-green font-bold text-sm bg-auditor-green/10 px-4 py-2 rounded-lg hover:bg-auditor-green/20">Verify</button>
          </div>
          
          <div class="flex items-center justify-between p-5 bg-black/20 rounded-xl border border-white/5 hover:border-auditor-green/30 transition-all cursor-pointer">
            <div class="flex items-center gap-4">
              <img src="https://ui-avatars.com/api/?name=John+Doe&background=2ECC71&color=fff" class="w-12 h-12 rounded-full border-2 border-auditor-green/20" alt="User">
              <div>
                <p class="font-bold">John Doe</p>
                <p class="text-gray-500 text-sm">Member ID: VSE-1204</p>
              </div>
            </div>
            <button class="text-auditor-green font-bold text-sm bg-auditor-green/10 px-4 py-2 rounded-lg hover:bg-auditor-green/20">Verify</button>
          </div>
        </div>
      </div>

      <!-- Compliance Summary -->
      <div class="glass-container glass-auditor p-10 relative overflow-hidden">
        <div class="absolute -bottom-20 -right-20 w-64 h-64 bg-auditor-green/5 rounded-full blur-3xl"></div>
        <h2 class="text-2xl font-bold mb-8">Auditor Intelligence</h2>
        
        <div class="space-y-8">
          <div class="space-y-4">
            <div class="flex justify-between text-sm">
              <span class="text-gray-400">Compliance Rate</span>
              <span class="text-auditor-green">94%</span>
            </div>
            <div class="h-2 bg-white/5 rounded-full overflow-hidden">
              <div class="h-full bg-auditor-green w-[94%] shadow-[0_0_10px_rgba(46,204,113,0.5)]"></div>
            </div>
          </div>

          <div class="grid grid-cols-2 gap-4">
            <div class="bg-white/5 p-6 rounded-2xl border border-white/5">
              <p class="text-gray-500 text-xs uppercase mb-1">Approved</p>
              <p class="text-2xl font-bold text-auditor-green">412</p>
            </div>
            <div class="bg-white/5 p-6 rounded-2xl border border-white/5">
              <p class="text-gray-500 text-xs uppercase mb-1">Rejected</p>
              <p class="text-2xl font-bold text-red-400">18</p>
            </div>
          </div>

          <button class="btn-auditor w-full py-4 mt-4">Generate Compliance Stamp</button>
        </div>
      </div>

    </div>

  </div>
</div>
