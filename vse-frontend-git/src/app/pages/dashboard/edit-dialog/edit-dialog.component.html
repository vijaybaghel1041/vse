<h2 mat-dialog-title>Edit Submission</h2>

<mat-dialog-content>

  <mat-form-field appearance="outline" class="full-width">
    <mat-label>Employee ID</mat-label>
    <input matInput [(ngModel)]="data.employeeId" />
  </mat-form-field>

  <mat-form-field appearance="outline" class="full-width">
    <mat-label>Goals Achieved</mat-label>
    <input matInput [(ngModel)]="data.goalsAchieved" />
  </mat-form-field>

  <mat-form-field appearance="outline" class="full-width">
    <mat-label>Self Rating</mat-label>
    <input matInput type="number" [(ngModel)]="data.selfRating" />
  </mat-form-field>

  <mat-form-field appearance="outline" class="full-width">
    <mat-label>Year</mat-label>
    <input matInput type="number" [(ngModel)]="data.year" />
  </mat-form-field>

</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button (click)="close()">Cancel</button>
  <button mat-raised-button color="primary" (click)="save()">Save</button>
</mat-dialog-actions>
