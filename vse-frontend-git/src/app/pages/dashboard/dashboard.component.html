<mat-card>
  <mat-card-title>📊 VSE Annual Submissions</mat-card-title>

  <!-- ✅ ONE TABLE ONLY -->
  <table
    mat-table
    [dataSource]="dataSource"
    matSort
    class="mat-elevation-z8">

    <!-- Employee -->
    <ng-container matColumnDef="employee">
      <th mat-header-cell *matHeaderCellDef mat-sort-header>
        Employee
      </th>
      <td mat-cell *matCellDef="let e">
        {{ e.employeeId }}
      </td>
    </ng-container>

    <!-- Goals -->
    <ng-container matColumnDef="goals">
      <th mat-header-cell *matHeaderCellDef mat-sort-header>
        Goals
      </th>
      <td mat-cell *matCellDef="let e">
        {{ e.goalsAchieved }}
      </td>
    </ng-container>

    <!-- Rating -->
    <ng-container matColumnDef="rating">
      <th mat-header-cell *matHeaderCellDef mat-sort-header>
        Rating
      </th>
      <td mat-cell *matCellDef="let e">
        {{ e.selfRating }}
      </td>
    </ng-container>

    <!-- Year -->
    <ng-container matColumnDef="year">
      <th mat-header-cell *matHeaderCellDef mat-sort-header>
        Year
      </th>
      <td mat-cell *matCellDef="let e">
        {{ e.year }}
      </td>
    </ng-container>

    <!-- Actions -->
    <ng-container matColumnDef="action">
      <th mat-header-cell *matHeaderCellDef>
        Action
      </th>
      <td mat-cell *matCellDef="let e">
        <button mat-button color="primary" (click)="edit(e)">
          Edit
        </button>
        <button mat-button color="warn" (click)="delete(e.id)">
          Delete
        </button>
      </td>
    </ng-container>

    <!-- Rows -->
    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>

  </table>

  <!-- ✅ PAGINATOR MUST BE BELOW TABLE -->
  <mat-paginator
    [pageSize]="5"
    [pageSizeOptions]="[5, 10, 20]"
    showFirstLastButtons>
  </mat-paginator>

</mat-card>
