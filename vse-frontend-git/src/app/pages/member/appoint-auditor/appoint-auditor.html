<div class="page-wrap">
  <div class="page-header">
    <div>
      <div class="page-badge"><span class="dot member"></span> MEMBER AREA</div>
      <h1 class="page-title">Auditor Appointment</h1>
      <p class="page-sub">Assign an auditor for your enabled submission (if eligible)</p>
    </div>
  </div>

  <div class="card glass-subtle">
    <div *ngIf="!myRecord" class="empty-state">
      You are not enabled for this audit cycle. Contact admin to enable your submission.
    </div>

    <div *ngIf="myRecord">
      <div class="form-grid">
        <div>
          <label>Member Code</label>
          <div class="info">{{ myRecord.memberCode }}</div>
        </div>
        <div>
          <label>Audit Period</label>
          <div class="info">{{ myRecord.auditPeriod }}</div>
        </div>
        <div class="full-span">
          <label>Assign Auditor (username)</label>
          <input type="text" [(ngModel)]="auditorUsername" placeholder="e.g. auditor1" class="form-input">
        </div>
      </div>

      <div style="margin-top:12px;">
        <button class="btn-primary" (click)="appoint()" [disabled]="assigning">{{ assigning ? 'Assigning...' : 'Assign Auditor' }}</button>
      </div>
    </div>
  </div>

</div>
